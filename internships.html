<!DOCTYPE html>
<html>

<head>
<link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
</head>

<body>

<h1>Available Internships</h1>

{% for job in jobs %}

<div class="card">

<h2>{{ job.company }}</h2>

<p>{{ job.role }}</p>

<p>{{ job.location }}</p>

<a href="/apply/{{ job.id }}">
<button>Apply</button>
</a>

</div>

{% endfor %}

</body>
</html>
